<div class="floating-heart" style="left:10%; animation-duration:6s;">❤️</div>
<div class="floating-heart" style="left:30%; animation-duration:8s;">❤️</div>
<div class="floating-heart" style="left:50%; animation-duration:7s;">❤️</div>
<div class="floating-heart" style="left:70%; animation-duration:9s;">❤️</div>
<div class="floating-heart" style="left:85%; animation-duration:5s;">❤️</div>

<script>
  // Function to create a heart
  function createHeart() {
    const heart = document.createElement('div');
    heart.className = 'floating-heart';
    heart.innerText = '❤️';

    // Random horizontal position
    heart.style.left = Math.random() * 100 + 'vw';

    // Random size
    const size = Math.random() * 20 + 15; // 15px - 35px
    heart.style.fontSize = size + 'px';

    // Random animation duration
    heart.style.animationDuration = (Math.random() * 5 + 5) + 's'; // 5-10s

    // Add to body
    document.body.appendChild(heart);

    // Remove heart after animation ends
    heart.addEventListener('animationend', () => {
      heart.remove();
    });
  }

  // Create hearts continuously
  setInterval(createHeart, 800); // every 0.8 seconds
</script>
