<!DOCTYPE html>
<html>
    <style>
        body{
            overflow: hidden;
            background-color: rgb(235, 194, 194);
        }
        @keyframes fall {
            0% {
                transform: translateY(-1%);
                opacity: 1;
            }
            100% {
                transform: translateY(100vh);
                opacity: 0;
            }
        }

        .heart {
            font-size: 40px;
            color: red;
            position: absolute;
            animation: fall 3s linear infinite;
        }
        #two{
            margin-top: 1.5%;
            background-color: rgb(7, 74, 52);
            text-decoration: dotted;
            margin-left: 7%;
            width: 80%;
            height: 15%;
            font-size: smaller;
            font-family:'Courier New', Courier, monospace;
            color: beige;
            border-radius: 2%;
        }
        h3{
            font-size: x-large;
            font-family:'Courier New', Courier, monospace;
            color: rgb(42, 55, 156);
        }
    </style>
<body>
    <br><br>
    <label onclick="click0()">
        <input type="radio" name="yesNo" value="yes" > Aaj se 💕.
    </label>
    <br><br>
    <label onclick="click1()">
        <input type="radio" name="yesNo" value="no"> Bachpan se ❤️.
    </label>
    <br><br>
<h3 style="text-align: center;color: rgb(15, 103, 93);font-size: medium; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;background-color: antiquewhite;"><b>Read it First 💕</b></h3>
<h3 style="text-align: center;color: rgb(15, 103, 93);font-size: medium; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;background-color: antiquewhite;"> <pre>Kash tum bhi jor se gale lagaker kaho 🤨
    Darte Q ho pagal🙈
    Hum sirf aapke hin hain💕
</pre></h3>

<script>
function click0() {
         alert("AAj se kahna hai aapko apni 💕")
    console.log("AAj se kehna hai aako apni 💕");
    window.close();
}
function click1() {
         alert("Bachpan se kahna hai aapko apni ❤️")
    console.log("Bachpan se kehna hai aako apni ❤️");
    window.close();
}
   
    function getRandomNumber(min, max) {
        return Math.floor(Math.random() * (max - min + 1)) + min;
    }

    // Create and position falling heart elements
    for (let i = 0; i < 50; i++) { // Change the number to control how many hearts you want
        const heart = document.createElement('div');
        heart.classList.add('heart');
        heart.innerHTML = '&hearts;'
        heart.style.top = getRandomNumber(-150, 300) + 'px';
        heart.style.left = getRandomNumber(0, window.innerWidth - 30) + 'px';
        document.body.appendChild(heart);
    }

</script>
</body>
</html>
