<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Arial, sans-serif;
}

body {
  background: #0f172a;
  color: white;
}

/* ===== Page Handling ===== */
.page {
  display: none;
  min-height: 100vh;
  padding: 20px;
}

.page:target,
#home {
  display: block;
}

h1 {
  text-align: center;
  margin-bottom: 20px;
}

/* ===== GRID ===== */
.grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr); /* Desktop: 4 in one row */
  gap: 15px;
}

/* Tablet */
@media (max-width: 900px) {
  .grid {
    grid-template-columns: repeat(2, 1fr);
  }
}

/* Mobile */
@media (max-width: 480px) {
  .grid {
    grid-template-columns: repeat(2, 1fr);
  }

  .card {
    padding: 20px;
  }

  .icon {
    font-size: 28px;
  }
}

/* ===== CARDS ===== */
.card {
  background: #1e293b;
  border-radius: 16px;
  padding: 25px;
  min-height: 120px;
  text-align: center;
  text-decoration: none;
  color: white;
  cursor: pointer;
  transition: 0.3s ease;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}

.card:hover {
  background: #334155;
  transform: scale(1.05);
}

.icon {
  font-size: 36px;
  margin-bottom: 10px;
}

/* ===== SUB PAGE ===== */
.subpage {
  text-align: center;
}

.back {
  display: inline-block;
  margin-top: 20px;
  color: #38bdf8;
  text-decoration: none;
  font-size: 16px;
}
</style>
</head>

<body>

<!-- ===== HOME / PARENT SCREEN ===== -->
<section id="home" class="page">
  <h1>📂 My Dashboard</h1>

  <div class="grid">

    <a href="ValentineSpecial_2k24/index.html" class="card">
      <div class="icon">❤️</div>
      Love 2k24
    </a>

    <a href="ValentineSpecial_2k26/parent.html" class="card">
      <div class="icon">💖</div>
      Love 2k26
    </a>

    <a href="spyCell/index.html" class="card">
      <div class="icon">🕵️</div>
      SpyCell
    </a>

    <a href="Austro/index.html" class="card">
      <div class="icon">🕉</div>
      Austro 
    </a>
    
    <a href="#more" class="card">
      <div class="icon">➕</div>
      More
    </a>

  </div>
</section>

<!-- ===== MORE PAGE (INTERNAL) ===== -->
<section id="more" class="page subpage">
  <h1>➕ More</h1>
  <p>More features coming soon</p>
  <a href="#home" class="back">⬅ Back</a>
</section>

</body>
</html>
