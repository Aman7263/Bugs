<!DOCTYPE html>
<html>
    <style>
        body {
            overflow: hidden;
            background-color: rgb(235, 194, 194);
        }
        .one{
            margin-top: 16%;
            text-align: center;
            display: flex;
            justify-content: space-evenly;
        }
        .one button{
            background-color: rgb(7, 74, 52);
            text-decoration: dotted;
            width: 17%;
            height: 10%;
            font-size: medium;
            font-family:'Courier New', Courier, monospace;
            color: beige;
            border-radius: 2%;
        }
        .two{
            border-color: rgb(235, 194, 194);;
            color: rgb(235, 194, 194);
            margin-top: 20%;
            margin-left: 95%;
            border-radius: 30%;
            border-color: rgb(235, 194, 194);
            background-color: rgb(235, 194, 194);
        }
        @keyframes fall {
            0% {
                transform: translateY(-1%);
                opacity: 1;
            }
            100% {
                transform: translateY(100vh);
                opacity: 0;
            }
        }

        .heart {
            font-size: 48px;
            color: red;
            position: absolute;
            animation: fall 3s linear infinite;
            
        }
        h2{
            text-align: center;
        }
        .heart1 {
            margin-top: 10%;
            margin-left: 40%;
            font-size: 208px;
            color: red;
            position: absolute;
            animation: pulse 2s infinite alternate;;
            
        }

        @keyframes pulse {
            0% {
                transform: scale(1);
            }
            50% {
                transform: scale(0.8);
            }
            100% {
                transform: scale(1);
            }
        }
    </style>
<body>

function getRandomNumber(min, max) {
            return Math.floor(Math.random() * (max - min + 1)) + min;
        }

        // Create and position falling heart elements
        for (let i = 0; i < 50; i++) { // Change the number to control how many hearts you want
