<div class="card">
  <h2>Itni Mohabbat 💖</h2>

  <p class="poetry">
Kabhi socha nahi tha  
Ki kisi ka khayal is kadar apna ho jaayega 💕  
Bina baat ke muskurana  
Aur har baat mein sirf tum yaad aana ❤️  
  </p>

  <p class="poetry">
Ye jo dil bechain sa rehta hai na  
Isse koi shikayat nahi 💫  
Bas ek guzarish hai  
Tum yun hi mere saath rehna 💖
  </p>

  <div class="buttons">
    <button class="btn-yes" onclick="go()">
      ❤️ Aur Zyada ❤️
    </button>

      💔 Accha laga, par nahi 💔
    </button>
  </div>
</div>

}
