<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <title>What Do You Love? 💕</title>
  <link rel="stylesheet" href="style.css">

  <style>
    body {
  margin: 0;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* ensure container content stays centered */
.container {
  text-align: center;
}

    .container {
      animation: fadeIn 1.2s ease;
      max-width: 500px;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(15px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .subtitle {
      font-size: 0.95rem;
      opacity: 0.85;
      margin: 20px 0 10px;
      text-align: center;
    }

    .soft-text {
      font-size: 0.9rem;
      opacity: 0.85;
      line-height: 1.6;
      text-align: center;
    }

    /* EMOTION CHECKBOXES */
    .emotions {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      justify-content: center;
      margin: 20px 0;
    }

    .emotion {
      background: #ffe6ec;
      padding: 10px 16px;
      border-radius: 20px;
      cursor: pointer;
      font-size: 0.9rem;
      transition: all 0.3s ease;
      user-select: none;
    }

    .emotion input {
      display: none;
    }

    .emotion:hover {
      transform: scale(1.05);
    }

    .emotion input:checked + span {
      background: #ff91af;
      color: white;
      padding: 10px 16px;
      border-radius: 20px;
    }

    .emotion span {
      display: inline-block;
    }

    .send-btn {
      margin-top: 20px;
      padding: 12px 26px;
      border-radius: 30px;
      border: none;
      font-size: 1rem;
      cursor: pointer;
      background: linear-gradient(135deg, #ff9aa2, #ffb7c5);
      transition: 0.3s;
    }

    .send-btn:hover {
      transform: scale(1.05);
      box-shadow: 0 8px 20px rgba(255,105,180,0.35);
    }
  </style>
</head>

<body>

<div class="container">
  <h3>What Do You Love About Us? 💕</h3>

  <p class="poetry soft-text">
    I already love you —
    the way you are,
    the way you look,
    the way you smile,
    the way you laugh,
    the way you talk,
    the way you feel,
    and the way you exist… being honest 💞 💞
  </p>

  <div class="subtitle">
    Pick everything that feels true 😌
  </div>

  <!-- EMOTION CHECKBOXES -->
  <div class="emotions">

    <label class="emotion">
      <input type="checkbox" value="Emotional 💖">
      <span>💖 Emotional</span>
    </label>

    <label class="emotion">
      <input type="checkbox" value="Caring 🌸">
      <span>🌸 Caring</span>
    </label>

    <label class="emotion">
      <input type="checkbox" value="Protective 🛡️">
      <span>🛡️ Protective</span>
    </label>

    <label class="emotion">
      <input type="checkbox" value="Comforting 🤍">
      <span>🤍 Comforting</span>
    </label>

    <label class="emotion">
      <input type="checkbox" value="Fun & Crazy 😄">
      <span>😄 Fun & Crazy</span>
    </label>

    <label class="emotion">
      <input type="checkbox" value="Just Perfect 💞">
      <span>💞 Just Perfect</span>
    </label>

  </div>

  <button class="send-btn" onclick="sendEmotions()">
    💌 Send My Feelings
  </button>

</div>

<script src="hearts.js"></script>

<!-- EMAILJS -->
<script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>

<script>
  emailjs.init("qpU9rhcIiteDcetie");

  function sendEmotions() {
    const checked = document.querySelectorAll(".emotion input:checked");

    if (checked.length === 0) {
      alert("Pick at least one feeling 😌");
      return;
    }

    const emotions = Array.from(checked)
      .map(e => e.value)
      .join(", ");

    emailjs.send(
      "service_s5vx7yl",
      "template_6kbhwcm",
      {
        choice: emotions,
        date: new Date().toLocaleDateString(),
        time: new Date().toLocaleTimeString()
      }
    ).then(() => {
      alert("Aww 💕 Feelings delivered");
    }).catch(() => {
      alert("Oops 😅 Try again");
    });
  }
</script>

</body>
</html>
