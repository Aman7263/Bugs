<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Office Attendance</title>

<!-- ✅ Correct EmailJS SDK -->
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>

<style>
* {
    box-sizing: border-box;
}

body {
    margin: 0;
    font-family: "Segoe UI", sans-serif;
    background: linear-gradient(135deg, #74ebd5, #9face6);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
}

.card {
    width: 460px;
    background: #fff;
    border-radius: 14px;
    padding: 25px;
    box-shadow: 0 20px 40px rgba(0,0,0,0.2);
    animation: fadeIn 0.6s ease;
}

@keyframes fadeIn {
    from { transform: translateY(20px); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
}

h2 {
    text-align: center;
    margin-bottom: 8px;
}

.sub {
    text-align: center;
    font-size: 13px;
    color: #666;
    margin-bottom: 20px;
}

.employees {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
}

.employees label {
    background: #f5f7fa;
    padding: 8px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 14px;
    transition: 0.2s;
}

.employees input {
    margin-right: 6px;
}

.employees label:hover {
    background: #e6ecff;
}

.field {
    margin-top: 15px;
}

.field label {
    font-size: 13px;
    font-weight: 600;
}

.field input {
    width: 100%;
    padding: 9px;
    margin-top: 5px;
    border-radius: 6px;
    border: 1px solid #ccc;
}

button {
    width: 100%;
    margin-top: 20px;
    padding: 12px;
    font-size: 16px;
    border: none;
    border-radius: 8px;
    background: linear-gradient(135deg, #43e97b, #38f9d7);
    color: #000;
    font-weight: bold;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    transform: scale(1.03);
}
</style>
</head>

<body>

<div class="card">
    <h2>Attendance Confirmation</h2>
    <div class="sub">Reached office at or before 9:30 AM</div>

    <div class="employees">
        <label><input type="checkbox" value="Sonal"> Sonal</label>
        <label><input type="checkbox" value="Vishal"> Vishal</label>
        <label><input type="checkbox" value="Ajay"> Ajay</label>
        <label><input type="checkbox" value="Aman"> Aman</label>
        <label><input type="checkbox" value="Vikash"> Vikash</label>
        <label><input type="checkbox" value="Tanya"> Tanya</label>
        <label><input type="checkbox" value="Prakshit"> Prakshit</label>
        <label><input type="checkbox" value="Om"> Om</label>
        <label><input type="checkbox" value="Aradhana"> Aradhana</label>
        <label><input type="checkbox" value="Aquib"> Aquib</label>
        <label><input type="checkbox" value="Uttam"> Uttam</label>
        <label><input type="checkbox" value="Dhananjay"> Dhananjay</label>
        <label><input type="checkbox" value="DotNet"> DotNet</label>
    </div>

    <div class="field">
        <label>Arrival Time (≤ 9:30 AM)</label>
        <input type="time" id="time" max="09:30" value="09:30">
    </div>

    <div class="field">
        <label>Date</label>
        <input type="date" id="date">
    </div>

    <button onclick="sendMail()">Send Attendance</button>

    <button onclick="window.location.href='../index.html'"> ✨ ⬅️ Exit ✨ </button>

</div>

<script>
/* ✅ Initialize EmailJS safely */
(function () {
    emailjs.init("FhYEqstyGvtwNTCP6"); // Public Key
})();

/* Set today's date */
document.getElementById("date").valueAsDate = new Date();

function sendMail() {
    const checked = document.querySelectorAll(".employees input:checked");
    const time = document.getElementById("time").value;
    const date = document.getElementById("date").value;

    if (checked.length === 0) {
        alert("❌ Select at least one employee");
        return;
    }

    const limit = new Date("1970-01-01T09:30:00");
    const selected = new Date(`1970-01-01T${time}:00`);

    if (selected > limit) {
        alert("❌ Time must be 9:30 AM or earlier");
        return;
    }

    const names = Array.from(checked).map(cb => cb.value).join(", ");

    emailjs.send(
        "service_9paxf5j",
        "template_l8ibq57",
        {
            employee_name: names,
            arrival_time: time,
            attendance_date: date
        }
    )
    .then(() => {
        alert("✅ Attendance email sent successfully");
    })
    .catch(error => {
        console.error(error);
        alert("❌ Email failed. Check EmailJS setup.");
    });
}
</script>

</body>
</html>
