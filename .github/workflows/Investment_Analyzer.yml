name: Run Investment Analyzer

on:
  workflow_dispatch: # manual trigger
  push:
    branches:
      - main

jobs:
  run-html-js:
    runs-on: ubuntu-latest

    # Make GEMINI_API_KEY available to Node.js
    env:
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

    steps:
      # Checkout your repo
      - uses: actions/checkout@v3

      # Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20

      # Install dependencies if you had any (optional)
      - name: Install dependencies
        run: npm install || echo "No dependencies"

      # Run a Node.js script to test API key (optional)
      - name: Test GEMINI_API_KEY
        run: |
          node -e "
          console.log('GEMINI_API_KEY loaded:', !!process.env.GEMINI_API_KEY);
          "