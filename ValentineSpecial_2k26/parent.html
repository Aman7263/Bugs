<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Unlock the Surprise 💖</title>

<link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600;700&family=Poppins:wght@300;400&display=swap" rel="stylesheet">

<style>
  * { box-sizing: border-box; }

  body {
    margin: 0;
    height: 100vh;
    background: radial-gradient(circle at top, #3a0f2e, #120012);
    display: flex;
    justify-content: center;
    align-items: center;
    color: #ffe6f2;
    font-family: 'Poppins', sans-serif;
    text-align: center;
  }

  .container {
    width: 360px;
    padding: 40px 30px;
    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(8px);
    border-radius: 25px;
    box-shadow: 0 30px 60px rgba(0,0,0,0.6);
    animation: fadeIn 1.2s ease;
  }

  h1 {
    font-family: 'Dancing Script', cursive;
    font-size: 42px;
    margin-bottom: 10px;
  }

  p {
    font-size: 15px;
    opacity: 0.9;
  }

  input {
    width: 100%;
    margin-top: 25px;
    padding: 14px;
    font-size: 20px;
    text-align: center;
    border-radius: 14px;
    border: none;
    outline: none;
    letter-spacing: 6px;
  }

  button {
    margin-top: 25px;
    width: 100%;
    padding: 14px;
    border-radius: 30px;
    border: none;
    background: linear-gradient(135deg, #ff4f81, #c9184a);
    color: #fff;
    font-size: 16px;
    cursor: pointer;
  }

  .error {
    display: none;
    margin-top: 15px;
    color: #ffd1e8;
    font-size: 14px;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: scale(0.95); }
    to { opacity: 1; transform: scale(1); }
  }
</style>
</head>

<body>

<div class="container">
  <h1>🔐 A Little Lock</h1>
  <p>Only for the one who owns my heart 💕</p>

  <input type="password" id="pass" maxlength="4" placeholder="••••"
    onkeyup="if(event.key==='Enter') unlock()">

  <button onclick="unlock()">💖 Unlock My Surprise 💖</button>

  <button onclick="window.location.href='../index.html'"> ✨ ⬅️ Exit ✨ </button>

  <div id="error" class="error">Wrong number 🥺</div>
</div>

<script>
/* 🔒 HARD NAVIGATION GUARD */
(function lockNavigation() {
  let depth = 50;

  history.replaceState({ depth }, "", location.href);
  for (let i = 0; i < depth; i++) {
    history.pushState({ depth: i }, "", location.href);
  }

  window.addEventListener("popstate", () => {
    // kill session
    sessionStorage.clear();

    // redirect to dead end
    location.replace("about:blank");
  });
})();

function unlock() {
  const code = pass.value;
  const error = document.getElementById("error");

  if (code === "0516") {
    sessionStorage.setItem("unlocked", "true");
    location.replace("special/index.html");
  } else {
    error.style.display = "block";
  }
}
</script>


</body>
</html>
